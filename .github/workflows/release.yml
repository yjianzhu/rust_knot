name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: rust_knot-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rust_knot-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rust_knot-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/rust_knot ${{ matrix.artifact }}
      - name: Package binary (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/rust_knot.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rust_knot-linux-x86_64/rust_knot-linux-x86_64
            artifacts/rust_knot-windows-x86_64.exe/rust_knot-windows-x86_64.exe
            artifacts/rust_knot-macos-arm64/rust_knot-macos-arm64
